# espanso match file

# For a complete introduction, visit the official docs at: https://espanso.org/docs/

# You can use this file to define the base matches (aka snippets)
# that will be available in every application when using espanso.

# Matches are substitution rules: when you type the "trigger" string
# it gets replaced by the "replace" string.
matches:

  # Simple text replacement
  - trigger: ":espanso"
    replace: "Hi there!"

  - trigger: ":mvh"
    replace: "Med vänlig hälsning \nAlexander Klippel"

  - trigger: ":fridens"
    replace: "Fridens liljor \nAlexander"

  - trigger: ":shrugs"
    replace: "¯\_(ツ)_/¯"

  # Print the current date
  - trigger: ":date"
    replace: "{{mydate}}"
    vars:
      - name: mydate
        type: date
        params:
          format: "%d-%m-%Y"

  # Print the output of a shell command
  - trigger: ":shell"
    replace: "{{output}}"
    vars:
      - name: output
        type: shell
        params:
          cmd: "echo 'Hello from your shell'"

  # ASCII Arrows
  - triggers: [":-->", ":rarrow"]
    replace: "→"
  - triggers: [":<--", ":larrow"]
    replace: "←"
  - triggers: [":uarrow"]
    replace: "↑"
  - triggers: [":darrow"]
    replace: "↓"
  - triggers: [":lrarrow"]
    replace: "↓"

  # Common Currency Symbols
  - trigger: ':eur'
    replace: '€'
  - trigger: ':gbp'
    replace: '£'
  - trigger: ':usd'
    replace: '$'
  - trigger: ':jpy'
    replace: '¥'
  - trigger: ':inr'
    replace: '₹'
  - trigger: ':btc'
    replace: '฿'
  - trigger: ':eth'
    replace: 'Ξ'

  - triggers: [':(c)', ':copyright:']
    replace: '©'

  # MARDOWN

  # Inserts a markdown code block
  - trigger: :md-code
    replace: "```\n$|$\n```"
    
  # Inserts markdown collapsable section
  - trigger: :md-collapse
    replace: "\n<details>\n\t<summary>$|$</summary>\n\t<p></p>\n</details>"
      
  # Outputs markdown link, with clipboard contents as the URL
  - trigger: ":md-link"
    replace: "[$|$]({{clipboard}})"
    vars:
    - name: "clipboard"
      type: "clipboard"
      
  # Creates a HTML anchor element, with clipboard contents as href
  - trigger: ":html-link"
    replace: "<a href=\"{{clipboard}}\" />$|$</a>"
    vars:
    - name: "clipboard"
      type: "clipboard"

  # Outputs BB Code link, with clipboard contents as the URL
  - trigger: ":bb-link"
    replace: "[url={{clipboard}}]$|$[/url]"
    vars:
    - name: "clipboard"
      type: "clipboard"
          
  # Auto close brackets, quotes and formatting modifiers, and put cursor in center
  - trigger: ':(('
    replace: '($|$)'
  - trigger: ':[['
    replace: '[$|$]'
  - trigger: ':{{'
    replace: '{$|$}'
  - trigger: ':<<'
    replace: '<$|$>'
  - trigger: ':``'
    replace: '`$|$`'
  - trigger: ":\''"
    replace: "\'$|$\'"
  - trigger: ':""'
    replace: '"$|$"'
  - trigger: ':__'
    replace: '_$|$_'
  - trigger: ':**'
    replace: '*$|$*'
